{% extends 'incident/base.html' %}
{% block auth_content %}
<div class="min-vh-100 d-flex" style="background: linear-gradient(135deg, #0a3259 0%, #1a6bb5 100%);">
    <div class="m-auto text-center" style="width:100%;max-width:460px;padding:20px;">
        <div class="card p-5">
            <div class="mb-4">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width:72px;height:72px;background:#d1fae5;">
                    <i class="bi bi-check-circle-fill text-success" style="font-size:2.2rem;"></i>
                </div>
                <h4 class="fw-800 text-dark">Registration Successful!</h4>
                <p class="text-muted">Your account has been created, <strong>{{ user.full_name }}</strong>.</p>
                <p class="text-muted small">You can now log in using your username and password.</p>
            </div>
            <a href="{% url 'login' %}" class="btn fw-700 text-white py-2" style="background:#0f4c81;">
                <i class="bi bi-box-arrow-in-right me-2"></i>Proceed to Login
            </a>
        </div>
        <p class="text-white opacity-50 small mt-3">Republic of the Philippines — Barangay LGU</p>
    </div>
</div>
{% endblock %}
